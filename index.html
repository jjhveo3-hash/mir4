        :root {
            --bg-color: #0f0f15;
            --card-bg: #161622;
            --accent-color: #ff9800;
            --success-color: #4caf50;
            --danger-color: #f44336;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #252538;
            --progress-color: #00bcd4;
            --past-color: #78909c;
        }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        .container { 
            width: 100%; 
            max-width: 950px; 
            box-sizing: border-box; 
            flex: 1;
        }
        .header {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }
        h1 { margin: 0 0 10px 0; font-size: 24px; color: var(--accent-color); }
        .clock { font-size: 18px; font-weight: bold; color: #fff; font-variant-numeric: tabular-nums; margin-bottom: 15px; }
        
        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .selector-group {
            display: inline-flex;
            background: #1f1f30;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .ctrl-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn.active {
            background: var(--accent-color);
            color: #000;
        }
        .ctrl-btn.lang-active {
            background: #00bcd4;
            color: #000;
        }

        .modal-open-btn {
            background: #2b2b40;
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 9px 16px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-open-btn:hover {
            background: #3b3b55;
            border-color: var(--accent-color);
        }
        .past-log-btn {
            background: #372a3a;
        }
        .past-log-btn:hover {
            background: #4a3550;
            border-color: #9c27b0;
        }

        .board-header {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.8fr 1.3fr 2fr;
            padding: 12px 16px;
            background: #1f1f30;
            border-radius: 8px 8px 0 0;
            font-weight: bold;
            font-size: 14px;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            border-bottom: none;
        }
        .boss-list {
            background: var(--card-bg);
            border-radius: 0 0 8px 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 40px;
        }
        .boss-row {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.8fr 1.3fr 2fr;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            font-size: 15px;
            transition: background 0.2s;
        }
        .boss-row:last-child { border-bottom: none; }
        
        .type-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            text-align: center;
            white-space: nowrap;
        }
        
        .badge-w1 { background-color: #2e7d32; color: #e8f5e9; }
        .badge-w2 { background-color: #1565c0; color: #e3f2fd; }
        .badge-w3 { background-color: #00838f; color: #e0f7fa; }
        .badge-w4 { background-color: #0288d1; color: #e1f5fe; }
        .badge-w5 { background-color: #ad1457; color: #fce4ec; }
        .badge-w6 { background-color: #6a1b9a; color: #f3e5f5; }
        .badge-w7 { background-color: #d84315; color: #fbe9e7; }
        .badge-w8 { background-color: #1a237e; color: #e8eaf6; border: 1px solid #ffd700; }
        .badge-l1w1 { background-color: #e65100; color: #fff3e0; border: 1px solid #ffb74d; }
        .badge-l1w2 { background-color: #37474f; color: #eceff1; border: 1px solid #90a4ae; }
        
        .map-name { color: #cfd8dc; font-weight: 500; }
        .boss-name { color: #fff; font-weight: bold; }
        .spawn-time { color: var(--accent-color); font-weight: bold; font-variant-numeric: tabular-nums; }
        .countdown { font-weight: bold; text-align: right; font-variant-numeric: tabular-nums; color: var(--success-color); }
        
        .imminent-row { background: rgba(244, 67, 54, 0.08); }
        .imminent-row .countdown { color: var(--danger-color); animation: blink 1s infinite alternate; }
        
        .progress-row { background: rgba(0, 188, 212, 0.12); border-left: 4px solid var(--progress-color); }
        .progress-row .countdown { color: var(--progress-color); font-weight: 900; }
        
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background: #1a1a26;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            width: 100%;
            max-width: 850px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 { margin: 0; font-size: 18px; color: var(--accent-color); }
        .modal-close-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 24px; cursor: pointer; line-height: 1;
        }
        .modal-close-btn:hover { color: #fff; }
        .modal-body { padding: 20px; overflow-y: auto; }
        
        .table-all { width: 100%; border-collapse: collapse; font-size: 14px; }
        .table-all th { background: #232335; color: var(--text-muted); padding: 10px; text-align: left; font-weight: 600; }

        .intervals-wrapper { display: flex; flex-wrap: wrap; gap: 6px; color: #ccc; }
        .interval-tag { background: #252538; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; }
        
        .text-past-time { color: var(--past-color); font-weight: 500; font-family: monospace; }

            font-size: 13px;

</head>

    function getTargetTimeZoneStr() {
        return currentZone === 'ASIA' ? 'Asia/Hong_Kong' : 'Asia/Seoul';
    }

    // 특정 타임존 기준의 절대 Date 객체를 만드는 함수
    function getZonedDate(baseDate, tzString) {
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: tzString, year: 'numeric', month: 'numeric', day: 'numeric',
            hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false
        });
        const parts = formatter.formatToParts(baseDate);
        const map = {};
        parts.forEach(p => { if(p.type !== 'literal') map[p.type] = p.value; });
        
        return new Date(map.year, map.month - 1, map.day, map.hour, map.minute, map.second);
    }

        document.getElementById('main-title').innerText = t.title;
        document.getElementById('btn-view-table').innerText = t.viewTable;
        document.getElementById('btn-view-past').innerText = t.viewPast;
        document.getElementById('th-type').innerText = t.thType;
        document.getElementById('th-map').innerText = t.thMap;
        document.getElementById('th-boss').innerText = t.thBoss;
        document.getElementById('th-time').innerText = t.thTime;
        document.getElementById('th-countdown').innerText = t.thCountdown;
        
        document.getElementById('mth-type').innerText = t.thType;
        document.getElementById('mth-map').innerText = t.thMap;
        document.getElementById('mth-boss').innerText = t.thBoss;
        document.getElementById('mth-schedule').innerText = t.mthSchedule;

        document.getElementById('pth-type').innerText = t.thType;
        document.getElementById('pth-map').innerText = t.thMap;
        document.getElementById('pth-boss').innerText = t.thBoss;
        document.getElementById('pth-time').innerText = `${t.thTime} & Gap`;
        document.getElementById('footer-text').innerText = t.footer;

        updateDashboard();
        if(document.getElementById('timetable-modal').style.display === 'flex') renderFullTimetable();
        if(document.getElementById('past-modal').style.display === 'flex') renderPastTimetable();
    }

    function formatTimeLabel(hourDecimal) {
        let h = Math.floor(hourDecimal);
        let m = Math.round((hourDecimal % 1) * 60);
        if (h >= 24) h -= 24;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function getBadgeClass(type) {
        const cleanType = type.toLowerCase().trim();
        if (cleanType === 'w1') return 'badge-w1';
        if (cleanType === 'w2') return 'badge-w2';
        if (cleanType === 'w3') return 'badge-w3';
        if (cleanType === 'w4') return 'badge-w4';
        if (cleanType === 'w5') return 'badge-w5';
        if (cleanType === 'w6') return 'badge-w6';
        if (cleanType === 'w7') return 'badge-w7';
        if (cleanType === 'w8') return 'badge-w8';
        if (cleanType.includes('layer 1- w1')) return 'badge-l1w1';
        if (cleanType.includes('layer 1- w2')) return 'badge-l1w2';
        return '';
    }

    function openModal() { document.getElementById('timetable-modal').style.display = 'flex'; renderFullTimetable(); }
    function openPastModal() { document.getElementById('past-modal').style.display = 'flex'; renderPastTimetable(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function closeModalViaBg(e, id) { if(e.target.id === id) closeModal(id); }

    // 📅 전체 시간표 렌더링 수정
    function renderFullTimetable() {
        const t = i18n[currentLang];
        document.getElementById('modal-title').innerText = `${t.modalTitle} (${currentZone})`;
        const bodyContainer = document.getElementById('modal-table-body');
        bodyContainer.innerHTML = '';

        bossData.forEach(item => {
            // KOR 타임존 선택 시에만 출력 시간을 1시간 보정하여 정렬
            const adjustedIntervals = item.intervals.map(time => {
                let adjusted = currentZone === 'KOR' ? time + 1 : time;
                return adjusted >= 24 ? adjusted - 24 : adjusted;
            });
            adjustedIntervals.sort((a, b) => a - b);

            const tr = document.createElement('tr');
            const customColorClass = getBadgeClass(item.type);

            let tagsHtml = '';
            adjustedIntervals.forEach(timeVal => {
                tagsHtml += `<span class="interval-tag">${formatTimeLabel(timeVal)}</span>`;
            });

            tr.innerHTML = `
                <td><span class="type-badge ${customColorClass}">${item.type}</span></td>
                <td class="map-name">${currentLang === 'KO' ? item.mapKo : item.mapEn}</td>
                <td class="boss-name">${currentLang === 'KO' ? item.bossKo : item.bossEn}</td>
                <td><div class="intervals-wrapper">${tagsHtml}</div></td>
            `;
            bodyContainer.appendChild(tr);
        });
    }

    // 📜 지난 보스 기록 렌더링 수정
    function renderPastTimetable() {
        const t = i18n[currentLang];
        document.getElementById('past-modal-title').innerText = `${t.pastModalTitle} (${currentZone})`;
        const bodyContainer = document.getElementById('past-table-body');
        bodyContainer.innerHTML = '';

        const realNow = new Date();
        const tz = getTargetTimeZoneStr();
        const zonedNow = getZonedDate(realNow, tz);
        
        const currentTargetHours = zonedNow.getHours() + zonedNow.getMinutes() / 60 + zonedNow.getSeconds() / 3600;
        const pastLogs = [];

        bossData.forEach(item => {
            const adjustedIntervals = item.intervals.map(time => {
                let adjusted = currentZone === 'KOR' ? time + 1 : time;
                return adjusted >= 24 ? adjusted - 24 : adjusted;
            });

            adjustedIntervals.forEach(timeVal => {
                let diffFromSpawn = currentTargetHours - timeVal;
                
                // 자정 경계 오차 보정 규칙
                if (currentTargetHours < 2 && timeVal > 22) {
                    diffFromSpawn = (currentTargetHours + 24) - timeVal;
                } else if (currentTargetHours > 22 && timeVal < 2) {
                    diffFromSpawn = currentTargetHours - (timeVal + 24);
                }

                if (diffFromSpawn >= 0 && diffFromSpawn <= 1.0) {
                    const minutesAgo = Math.floor(diffFromSpawn * 60);
                    pastLogs.push({
                        type: item.type,
                        map: currentLang === 'KO' ? item.mapKo : item.mapEn,
                        boss: currentLang === 'KO' ? item.bossKo : item.bossEn,
                        spawnTimeLabel: formatTimeLabel(timeVal),
                        minutesAgo: minutesAgo
                    });
                }
            });
        });

        pastLogs.sort((a, b) => a.minutesAgo - b.minutesAgo);

        if (pastLogs.length === 0) {
            bodyContainer.innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;">최근 1시간 내 등장한 보스가 없습니다.</td></tr>`;
            return;
        }

        pastLogs.forEach(log => {
            const tr = document.createElement('tr');
            const customColorClass = getBadgeClass(log.type);

            tr.innerHTML = `
                <td><span class="type-badge ${customColorClass}">${log.type}</span></td>
                <td class="map-name">${log.map}</td>
                <td class="boss-name">${log.boss}</td>
                <td class="text-past-time">${log.spawnTimeLabel} <span style="color:var(--accent-color); font-size:12px; margin-left:8px;">(${log.minutesAgo}${t.ago})</span></td>
            `;
            bodyContainer.appendChild(tr);
        });
    }

    // 🛠️ 핵심 대시보드 로직 (Intl 기반 완전 수정 버전)
    function updateDashboard() {
        const realNow = new Date();
        const t = i18n[currentLang];
        
        // 1. 선택한 타임존에 맞는 정밀 시간 객체 셋업
        const tz = getTargetTimeZoneStr();
        const zonedNow = getZonedDate(realNow, tz);
        
        // 시계 문자열 출력
        document.getElementById('live-clock').innerText = `${t.clock} (${currentZone}): ${String(zonedNow.getHours()).padStart(2, '0')}:${String(zonedNow.getMinutes()).padStart(2, '0')}:${String(zonedNow.getSeconds()).padStart(2, '0')}`;

        const timeline = [];

        bossData.forEach(item => {
            // 타임존에 따라 매칭할 로컬 스케줄 계산
            const adjustedIntervals = item.intervals.map(time => {
                let adjusted = currentZone === 'KOR' ? time + 1 : time;
                return adjusted >= 24 ? adjusted - 24 : adjusted;
            });
            adjustedIntervals.sort((a, b) => a - b);

            let targetSpawnHour = null;
            let targetSpawnDate = new Date(zonedNow); // 계산용 기본 베이스 데이트 복사
            let isCurrentlyActive = false;

            // 2. 현재 시간 진행중(+5분 판정) 체크
            for (let timeVal of adjustedIntervals) {
                let checkDate = new Date(zonedNow);
                const h = Math.floor(timeVal);
                const m = Math.round((timeVal % 1) * 60);
                checkDate.setHours(h, m, 0, 0);

                // 만약 새벽 타임이고 스케줄은 밤 23시 등인 경우 하루 전으로 계산 보정
                if (zonedNow.getHours() < 2 && h >= 22) {
                    checkDate.setDate(checkDate.getDate() - 1);
                }
                // 만약 밤 타임이고 스케줄은 새벽 0시 등인 경우 다음날로 계산 보정
                if (zonedNow.getHours() > 22 && h <= 1) {
                    checkDate.setDate(checkDate.getDate() + 1);
                }

                const diffMs = zonedNow - checkDate;
                if (diffMs >= 0 && diffMs <= (5 * 60 * 1000)) {
                    isCurrentlyActive = true;
                    targetSpawnHour = timeVal;
                    targetSpawnDate = checkDate;
                    break;
                }
            }

            // 3. 진행 중이 아닐 경우 가장 가까운 다음 등장 시간 체크
            if (!isCurrentlyActive) {
                let found = false;
                for (let timeVal of adjustedIntervals) {
                    let checkDate = new Date(zonedNow);
                    const h = Math.floor(timeVal);
                    const m = Math.round((timeVal % 1) * 60);
                    checkDate.setHours(h, m, 0, 0);

                    if (checkDate > zonedNow) {
                        targetSpawnHour = timeVal;
                        targetSpawnDate = checkDate;
                        found = true;
                        break;
                    }
                }

                // 오늘 남은 타임이 아예 없으면 내일의 첫 타임으로 배치
                if (!found) {
                    targetSpawnHour = adjustedIntervals[0];
                    const h = Math.floor(targetSpawnHour);
                    const m = Math.round((targetSpawnHour % 1) * 60);
                    targetSpawnDate.setDate(targetSpawnDate.getDate() + 1);
                    targetSpawnDate.setHours(h, m, 0, 0);
                }
            }

            // 4. 최종 정렬 및 렌더링에 사용할 정밀 밀리초(Ms) 차이 도출
            let finalDiffMs = 0;
            if (isCurrentlyActive) {
                // 상단 고정을 위한 임의 음수 가중치 스택 부여
                finalDiffMs = -1000000000 + (zonedNow - targetSpawnDate);
            } else {
                finalDiffMs = targetSpawnDate - zonedNow;
            }

            timeline.push({
                type: item.type,
                map: currentLang === 'KO' ? item.mapKo : item.mapEn,
                boss: currentLang === 'KO' ? item.bossKo : item.bossEn,
                spawnTimeLabel: formatTimeLabel(targetSpawnHour),
                diff: finalDiffMs,
                isActive: isCurrentlyActive
            });
        });

        // 오름차순 정렬
        timeline.sort((a, b) => a.diff - b.diff);

        // DOM 업데이트
        const boardContainer = document.getElementById('boss-board');
        boardContainer.innerHTML = '';

        timeline.forEach(item => {
            const row = document.createElement('div');
            row.className = 'boss-row';
            
            let countdownText = '';

            if (item.isActive) {
                row.className += ' progress-row';
                countdownText = t.inProgress;
            } else {
                const hoursLeft = Math.floor(item.diff / (1000 * 60 * 60));
                const minutesLeft = Math.floor((item.diff % (1000 * 60 * 60)) / (1000 * 60));
                const secondsLeft = Math.floor((item.diff % (1000 * 60)) / 1000);

                if (item.diff < 10 * 60 * 1000) {
                    row.className += ' imminent-row';
                }
                countdownText = `${hoursLeft}${t.hour}${minutesLeft}${t.min}${secondsLeft}${t.sec}`;
            }

            const customColorClass = getBadgeClass(item.type);

            row.innerHTML = `
                <div><span class="type-badge ${customColorClass}">${item.type}</span></div>
                <div class="map-name">${item.map}</div>
                <div class="boss-name">${item.boss}</div>
                <div class="spawn-time">${item.spawnTimeLabel}</div>
                <div class="countdown">${countdownText}</div>
            `;
            boardContainer.appendChild(row);
        });

        if (document.getElementById('past-modal').style.display === 'flex') {
            renderPastTimetable();
        }
    }

    setInterval(updateDashboard, 1000);
    updateDashboard();
</script>
