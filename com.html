    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #0b0b10;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Glassmorphism effects */
        .glass-card {
            background: rgba(22, 22, 34, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-header {
            background: rgba(30, 30, 48, 0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom neon glowing animations */
        .glow-cyan {
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.6);
        }
        .glow-amber {
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.6);
        }
        .glow-creator {
            animation: pulse-glow 3s infinite alternate;
        }
        @keyframes pulse-glow {
            from {
                color: #00bcd4;
                text-shadow: 0 0 8px rgba(0, 188, 212, 0.4);
            }
            to {
                color: #ff9800;
                text-shadow: 0 0 16px rgba(255, 152, 0, 0.8);
            }
        }
        /* Smooth blinking animation for imminent schedule */
        .blink-imminent {
            animation: blink 1s infinite alternate;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }
        /* Scrollbar customization */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f15;
        }
        ::-webkit-scrollbar-thumb {
            background: #252538;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff9800;
        }
    </style>

        }

        // Toggle "더보기/접기" schedules display
        function toggleExpandSchedules() {
            showAllSchedules = !showAllSchedules;
            updateExpandButtonText();
            updateDashboard();
        }

        function updateExpandButtonText() {
            const btn = document.getElementById('btn-expand-toggle');
            const dict = i18n[currentLang];
            btn.innerText = showAllSchedules ? dict.btnShowLess : dict.btnShowMore;
        }

        // Formats float value time to String time expression
        function formatHour(hourDecimal) {
            let h = Math.floor(hourDecimal);
            let m = Math.round((hourDecimal % 1) * 60);
            if (h >= 24) h -= 24;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }

        // Badge styling helpers
        function getBadgeStyles(badgeKey) {
            switch(badgeKey) {
                case "badge-green": return "bg-green-950/60 text-green-400 border border-green-800/40";
                case "badge-blue": return "bg-blue-950/60 text-blue-400 border border-blue-800/40";
                case "badge-amber": return "bg-amber-950/60 text-amber-400 border border-amber-800/40";
                case "badge-red": return "bg-red-950/60 text-red-400 border border-red-800/40";
                default: return "bg-slate-900/60 text-slate-400 border border-slate-700/40";
            }
        }

        // Calculates timezone normalized hours [0, 24) from current UTC time
        function getZoneCalculatedTime() {
            const now = new Date();
            const utcHours = now.getUTCHours() + now.getUTCMinutes() / 60 + now.getUTCSeconds() / 3600;
            const offset = currentZone === 'ASIA' ? 8 : 9;
            let currentSelectedHours = utcHours + offset;
            if (currentSelectedHours >= 24) currentSelectedHours -= 24;
            return currentSelectedHours;
        }

        // Main updates for schedule calculation, sorting, and UI population
        function updateDashboard() {
            const dict = i18n[currentLang];
            const now = new Date();
            
            // Normalize selected timezone time
            const currentSelectedHours = getZoneCalculatedTime();
            document.getElementById('live-clock').innerText = `${formatHour(currentSelectedHours)}:${String(now.getUTCSeconds()).padStart(2, '0')}`;

            const timeline = [];

            // Compile adjusted time for KOR / ASIA relative to original UTC+8 values
            rawSchedules.forEach(item => {
                let adjustedHour = item.hour;
                if (currentZone === 'KOR') {
                    adjustedHour = (item.hour + 1) % 24;
                }

                let isCurrentlyActive = false;
                let activeSpawnVal = adjustedHour;

                // Duration is set to 1 hour (60/60 hours)
                let diffFromSpawn = currentSelectedHours - adjustedHour;
                if (currentSelectedHours < 2 && adjustedHour > 22) {
                    diffFromSpawn = (currentSelectedHours + 24) - adjustedHour;
                } else if (currentSelectedHours > 22 && adjustedHour < 2) {
                    diffFromSpawn = currentSelectedHours - (adjustedHour + 24);
                }

                // If active (within 1 hour)
                if (diffFromSpawn >= 0 && diffFromSpawn <= 1.0) {
                    isCurrentlyActive = true;
                }

                let diffMs = 0;
                if (isCurrentlyActive) {
                    // Send to top using a strong negative bias offset
                    diffMs = -1000000000 + (diffFromSpawn * 60 * 60 * 1000);
                } else {
                    let diffHours = adjustedHour - currentSelectedHours;
                    if (diffHours < 0) diffHours += 24;
                    diffMs = diffHours * 60 * 60 * 1000;
                }

                timeline.push({
                    original: item,
                    adjustedHour: adjustedHour,
                    diff: diffMs,
                    isActive: isCurrentlyActive
                });
            });

            // Sort timeline by imminent next schedule order (Active first, then ascending time wait)
            timeline.sort((a, b) => a.diff - b.diff);

            // Populate currently active and next scheduled summaries
            renderSummaryWidgets(timeline, dict);

            // Populate dashboard container
            const boardContainer = document.getElementById('boss-board');
            boardContainer.innerHTML = '';

            // Handle expandable pagination (default 5 items)
            const visibleTimeline = showAllSchedules ? timeline : timeline.slice(0, 5);

            visibleTimeline.forEach(item => {
                const row = document.createElement('div');
                row.className = "boss-row grid grid-cols-12 gap-2 px-6 py-4 items-center transition-all duration-200 hover:bg-gray-800/20";

                let countdownText = '';
                const eventText = currentLang === 'KO' ? item.original.eventKo : item.original.eventEn;
                const mapText = currentLang === 'KO' ? item.original.mapKo : item.original.mapEn;
                const descText = currentLang === 'KO' ? item.original.descKo : item.original.descEn;

                // Combine MAP Class and Chamber details cleanly
                let mapSectionHtml = `<span class="font-semibold text-gray-200 text-xs py-1 px-2 rounded ${getBadgeStyles(item.original.badge)}">${mapText || "ROOM"}</span>`;
                if (descText) {
                    mapSectionHtml += `<span class="block text-xs text-gray-400 font-medium mt-1">${descText}</span>`;
                }

                if (item.isActive) {
                    row.className += " progress-row";
                    countdownText = `<span class="glow-cyan text-cyan-400 font-bold tracking-wide select-none">${dict.inProgress}</span>`;
                } else {
                    const hoursLeft = Math.floor(item.diff / (1000 * 60 * 60));
                    const minutesLeft = Math.floor((item.diff % (1000 * 60 * 60)) / (1000 * 60));
                    const secondsLeft = Math.floor((item.diff % (1000 * 60)) / 1000);

                    // Under 10 minutes imminent alarm blink
                    if (item.diff < 10 * 60 * 1000) {
                        row.className += " imminent-row bg-red-950/5";
                        countdownText = `<span class="glow-amber text-orange-400 font-bold blink-imminent">${hoursLeft}${dict.hourUnit} ${minutesLeft}${dict.minUnit} ${secondsLeft}${dict.secUnit}</span>`;
                    } else {
                        countdownText = `<span class="text-green-400 font-bold mono">${hoursLeft}${dict.hourUnit} ${minutesLeft}${dict.minUnit} ${secondsLeft}${dict.secUnit}</span>`;
                    }
                }

                row.innerHTML = `
                    <div class="col-span-2 text-left font-bold text-gray-300 mono text-sm">${formatHour(item.adjustedHour)}</div>
                    <div class="col-span-3 text-left font-bold text-white text-sm">${eventText || "CHAMBER ROTATION"}</div>
                    <div class="col-span-3 text-left text-sm">${mapSectionHtml}</div>
                    <div class="col-span-4 text-right text-sm">${countdownText}</div>
                `;
                boardContainer.appendChild(row);
            });

            // If the Past logs modal is active, update its table context in sync
            if (document.getElementById('past-modal').style.display === 'flex') {
                renderPastTimetable();
            }
        }

        // Renders active and next event details dynamically into top cards
        function renderSummaryWidgets(timeline, dict) {
            const activeContainer = document.getElementById('active-event-container');
            const nextContainer = document.getElementById('next-event-container');

            // Find currently running active events
            const activeEvents = timeline.filter(item => item.isActive);
            // Find closest upcoming event
            const upcomingEvents = timeline.filter(item => !item.isActive);
            const nextEvent = upcomingEvents[0];

            // Render Currently Active Cards
            if (activeEvents.length > 0) {
                activeContainer.innerHTML = activeEvents.map(item => {
                    const eventText = currentLang === 'KO' ? item.original.eventKo : item.original.eventEn;
                    const mapText = currentLang === 'KO' ? item.original.mapKo : item.original.mapEn;
                    const descText = currentLang === 'KO' ? item.original.descKo : item.original.descEn;
                    return `
                        <div class="flex justify-between items-center py-1">
                            <div>
                                <span class="font-extrabold text-white text-base block">${eventText || "CHAMBER ROTATION"}</span>
                                <span class="text-xs text-gray-400 font-medium block mt-0.5">${mapText}${descText ? ' &bull; ' + descText : ''}</span>
                            </div>
                            <span class="text-xs font-bold text-cyan-400 bg-cyan-950/50 border border-cyan-500/30 px-2 py-1 rounded-lg">${formatHour(item.adjustedHour)} - ${dict.inProgress}</span>
                        </div>
                    `;
                }).join('<div class="border-t border-gray-800/40 my-2 pt-2"></div>');
            } else {
                activeContainer.innerHTML = `
                    <div class="text-gray-500 font-medium text-sm flex items-center gap-2 py-3">
                        <span class="inline-block w-2.5 h-2.5 rounded-full bg-gray-700 animate-pulse"></span>
                        ${dict.noEvent}
                    </div>
                `;
            }

            // Render Next Scheduled Card
            if (nextEvent) {
                const eventText = currentLang === 'KO' ? nextEvent.original.eventKo : nextEvent.original.eventEn;
                const mapText = currentLang === 'KO' ? nextEvent.original.mapKo : nextEvent.original.mapEn;
                const descText = currentLang === 'KO' ? nextEvent.original.descKo : nextEvent.original.descEn;

                const hoursLeft = Math.floor(nextEvent.diff / (1000 * 60 * 60));
                const minutesLeft = Math.floor((nextEvent.diff % (1000 * 60 * 60)) / (1000 * 60));
                const secondsLeft = Math.floor((nextEvent.diff % (1000 * 60)) / 1000);

                let countdownColor = "text-emerald-400";
                let blinkClass = "";
                if (nextEvent.diff < 10 * 60 * 1000) {
                    countdownColor = "text-orange-400 glow-amber";
                    blinkClass = "blink-imminent";
                }

                nextContainer.innerHTML = `
                    <div class="flex justify-between items-center py-1">
                        <div>
                            <span class="font-extrabold text-white text-base block">${eventText || "CHAMBER ROTATION"}</span>
                            <span class="text-xs text-gray-400 font-medium block mt-0.5">${mapText}${descText ? ' &bull; ' + descText : ''}</span>
                        </div>
                        <div class="text-right">
                            <span class="text-[11px] text-gray-400 font-semibold block bg-gray-950/40 px-1.5 py-0.5 rounded border border-gray-800/50">${formatHour(nextEvent.adjustedHour)} 시작</span>
                            <span class="text-sm font-bold ${countdownColor} ${blinkClass} mono block mt-1">${hoursLeft}${dict.hourUnit} ${minutesLeft}${dict.minUnit} ${secondsLeft}${dict.secUnit}</span>
                        </div>
                    </div>
                `;
            } else {
                nextContainer.innerHTML = `<div class="text-gray-500 font-medium text-sm py-3">${dict.noNextEvent}</div>`;
            }
        }

        // Modals control flow
        function openModal() {
            document.getElementById('timetable-modal').style.display = 'flex';
            renderFullTimetable();
        }

        function openPastModal() {
            document.getElementById('past-modal').style.display = 'flex';
            renderPastTimetable();
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function closeModalViaBg(e, id) {
            if(e.target.id === id) closeModal(id);
        }

        // Renders complete 24 hours timeline configuration
        function renderFullTimetable() {
            const dict = i18n[currentLang];
            document.getElementById('modal-title').innerText = `${dict.modalTitle} (${currentZone})`;
            const bodyContainer = document.getElementById('modal-table-body');
            bodyContainer.innerHTML = '';

            const localSchedules = rawSchedules.map(item => {
                let adjustedHour = item.hour;
                if (currentZone === 'KOR') {
                    adjustedHour = (item.hour + 1) % 24;
                }
                return { original: item, adjustedHour: adjustedHour };
            });

            // Sort by standard timeline flow 00:00 -> 23:00
            localSchedules.sort((a, b) => a.adjustedHour - b.adjustedHour);

            localSchedules.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-800/30 hover:bg-gray-800/10 transition-colors";

                const eventText = currentLang === 'KO' ? item.original.eventKo : item.original.eventEn;
                const mapText = currentLang === 'KO' ? item.original.mapKo : item.original.mapEn;
                const descText = currentLang === 'KO' ? item.original.descKo : item.original.descEn;

                const mapSection = mapText ? `<span class="px-2 py-0.5 rounded text-xs ${getBadgeStyles(item.original.badge)}">${mapText}</span>` : `<span class="text-gray-600">-</span>`;

                tr.innerHTML = `
                    <td class="py-3 px-2 font-bold mono text-cyan-400">${formatHour(item.adjustedHour)}</td>
                    <td class="py-3 px-2 font-bold text-white text-xs md:text-sm">${eventText || "<span class='text-gray-500 font-normal'>-</span>"}</td>
                    <td class="py-3 px-2">${mapSection}</td>
                    <td class="py-3 px-2 text-xs md:text-sm font-medium text-gray-400">${descText || "-"}</td>
                `;
                bodyContainer.appendChild(tr);
            });
        }

        // Computes and renders logs occurring in the last 4 hours (excluding active period)
        function renderPastTimetable() {
            const dict = i18n[currentLang];
            document.getElementById('past-modal-title').innerText = `${dict.pastModalTitle} (${currentZone})`;
            const bodyContainer = document.getElementById('past-table-body');
            bodyContainer.innerHTML = '';

            const currentSelectedHours = getZoneCalculatedTime();
            const pastLogs = [];

            rawSchedules.forEach(item => {
                let adjustedHour = item.hour;
                if (currentZone === 'KOR') {
                    adjustedHour = (item.hour + 1) % 24;
                }

                let diffFromSpawn = currentSelectedHours - adjustedHour;
                if (currentSelectedHours < 4 && adjustedHour > 20) {
                    diffFromSpawn = (currentSelectedHours + 24) - adjustedHour;
                } else if (currentSelectedHours > 20 && adjustedHour < 4) {
                    diffFromSpawn = currentSelectedHours - (adjustedHour + 24);
                }

                // Show schedules completed within the last 4 hours (excluding 1 hour interval currently active in board)
                if (diffFromSpawn >= 1.0 && diffFromSpawn <= 5.0) {
                    const minutesAgo = Math.floor(diffFromSpawn * 60);
                    pastLogs.push({
                        original: item,
                        adjustedHour: adjustedHour,
                        minutesAgo: minutesAgo
                    });
                }
            });

            // Sort completed events by recency (the most recently completed first)
            pastLogs.sort((a, b) => a.minutesAgo - b.minutesAgo);

            if (pastLogs.length === 0) {
                bodyContainer.innerHTML = `<tr><td colspan="4" class="py-12 text-center text-gray-500 font-semibold text-sm">${dict.noPastEvents}</td></tr>`;
                return;
            }

            pastLogs.forEach(log => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-800/30 hover:bg-gray-800/10 transition-colors";

                const eventText = currentLang === 'KO' ? log.original.eventKo : log.original.eventEn;
                const mapText = currentLang === 'KO' ? log.original.mapKo : log.original.mapEn;
                const descText = currentLang === 'KO' ? log.original.descKo : log.original.descEn;

                let mapSection = mapText ? `<span class="px-2 py-0.5 rounded text-xs ${getBadgeStyles(log.original.badge)}">${mapText}</span>` : `<span class="text-gray-600">-</span>`;
                if (descText) {
                    mapSection += `<span class="block text-[11px] text-gray-400 mt-1">${descText}</span>`;
                }

                tr.innerHTML = `
                    <td class="py-4 px-2 font-bold text-gray-400 mono">${formatHour(log.adjustedHour)}</td>
                    <td class="py-4 px-2 font-bold text-white text-xs md:text-sm">${eventText || "CHAMBER ROTATION"}</td>
                    <td class="py-4 px-2">${mapSection}</td>
                    <td class="py-4 px-4 text-right font-medium text-amber-500/80 text-xs md:text-sm mono">${log.minutesAgo} ${dict.agoUnit}</td>
                `;
                bodyContainer.appendChild(tr);
            });
        }

        // Start live tracking loop and initialize defaults
        setInterval(updateDashboard, 1000);
        setTimezone('ASIA');
        setLanguage('KO');
    </script>
</body>
</html>
